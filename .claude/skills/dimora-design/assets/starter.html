<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f4f4f6">
<title>Dimora design — starter</title>
<!-- 1) Thmanyah fonts (base64, offline)  2) tokens  3) components -->
<link rel="stylesheet" href="fonts.css">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="components.css">
</head>
<body>

<!-- Hero -->
<header class="wrap" style="text-align:center">
  <span class="eyebrow">إقامة بوتيكية</span>
  <h1 style="margin-top:14px">أهلًا بك</h1>
  <p class="lede">عنوان فرعي قصير وهادئ بنبرة راقية.</p>
  <a class="btn" href="#">ابدأ الآن</a>

  <!-- Showcase: photo/screenshot in a browser-mock window on a gradient pad -->
  <div class="pad" style="margin-top:30px">
    <figure class="mock" style="margin:0">
      <div class="mock-bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="mock-title">Dimora · preview</span></div>
      <img src="https://placehold.co/1200x750/eef0f4/86868b?text=image" alt="">
    </figure>
  </div>
</header>

<!-- Big-number highlights -->
<section class="wrap">
  <div class="stats">
    <div class="stat"><b>16:00</b><span>وقت الدخول</span></div>
    <div class="stat"><b>12:00</b><span>وقت الخروج</span></div>
    <div class="stat"><b>24/7</b><span>دعم متواصل</span></div>
  </div>
</section>

<!-- Section head + colourful gradient tiles -->
<section class="wrap">
  <div class="sec-head">
    <span class="chip"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m9 6 6 6-6 6"/></svg></span>
    <div><h2 class="sec-title">المزايا</h2><span class="sec-sub">Features</span></div>
  </div>
  <div class="tile-grid">
    <div class="tile"><span class="tile-ic"></span><b>ميزة ١</b></div>
    <div class="tile"><span class="tile-ic"></span><b>ميزة ٢</b></div>
    <div class="tile"><span class="tile-ic"></span><b>ميزة ٣</b></div>
    <div class="tile"><span class="tile-ic"></span><b>ميزة ٤</b></div>
  </div>
</section>

<!-- Pill toggle -->
<section class="wrap" style="text-align:center">
  <div class="seg-wrap">
    <button class="seg on">خيار أ</button>
    <button class="seg">خيار ب</button>
  </div>
</section>

</body>
</html>
