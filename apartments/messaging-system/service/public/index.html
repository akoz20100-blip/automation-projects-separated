<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Dimora — Booking Service</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f4f1ea;
        color: #2b2b2b;
      }
      .card {
        text-align: center;
        padding: 2rem;
      }
      .dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #889970;
        margin-right: 8px;
        vertical-align: middle;
      }
      h1 { font-weight: 600; font-size: 1.25rem; margin: 0 0 0.5rem; }
      p { color: #6b6b6b; font-size: 0.9rem; margin: 0; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1><span class="dot"></span>Dimora Booking Service</h1>
      <p>API is running. Guest pages are served under <code>/api/landing/&lt;apartment&gt;</code>.</p>
    </div>
  </body>
</html>
